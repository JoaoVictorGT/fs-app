name: DAST

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
  pull_request:
    branches: [main]
    paths:
      - 'backend/**'

jobs:
  zap:
    name: OWASP ZAP API Scan
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install deps
        working-directory: backend
        run: npm ci

      - name: Build
        working-directory: backend
        run: npm run build

      - name: Start backend
        working-directory: backend
        run: |
          NODE_ENV=test \
          PORT=4000 \
          JWT_SECRET=dast-test-secret \
          CORS_ORIGIN=http://localhost:3000 \
          FIREBASE_PROJECT_ID=demo-studio-fitness \
          FIRESTORE_EMULATOR_HOST=localhost:8080 \
          node dist/server.js &
          echo $! > /tmp/backend.pid

      - name: Wait for backend to be ready
        run: |
          retries=0
          until curl -sf http://localhost:4000/api/health; do
            echo "waiting for backend..."
            sleep 2
            retries=$((retries+1))
            if [ $retries -ge 20 ]; then
              echo "Backend not ready. Logs:"
              cat /tmp/backend.log 2>/dev/null || true
              exit 1
            fi
          done
          echo "Backend is ready"

      - name: Run OWASP ZAP API Scan
        uses: zaproxy/action-api-scan@v0.9.0
        with:
          target: http://localhost:4000/openapi.json
          fail_action: true
          allow_issue_writing: false
          cmd_options: '-I'

      - name: Upload ZAP report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: zap-report
          path: report_json.json

      - name: Stop backend
        if: always()
        run: kill $(cat /tmp/backend.pid) 2>/dev/null || true
