name: DAST

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
  pull_request:
    branches: [main]
    paths:
      - 'backend/**'

jobs:
  zap:
    name: OWASP ZAP API Scan
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install deps
        working-directory: backend
        run: npm ci

      - name: Build
        working-directory: backend
        run: npm run build

      - name: Start backend and wait for ready
        working-directory: backend
        run: |
          export NODE_ENV=test
          export PORT=4000
          export JWT_SECRET=dast-test-secret
          export CORS_ORIGIN=http://localhost:3000
          export FIREBASE_PROJECT_ID=demo-studio-fitness
          export FIRESTORE_EMULATOR_HOST=localhost:8080

          setsid node dist/server.js > /tmp/backend.log 2>&1 &
          SERVER_PID=$!
          echo $SERVER_PID > /tmp/backend.pid

          retries=0
          until curl -sf http://127.0.0.1:4000/api/health; do
            echo "waiting..."
            sleep 2
            retries=$((retries+1))
            if [ $retries -ge 20 ]; then
              echo "=== TIMEOUT ==="
              ss -tlnp | grep ':4000' || echo "Nothing on port 4000"
              kill -0 $SERVER_PID 2>&1 && echo "alive" || echo "DEAD"
              echo "=== LOG ==="
              cat /tmp/backend.log || echo "(empty)"
              exit 1
            fi
          done
          echo "Backend is ready"

      - name: Run OWASP ZAP API Scan
        uses: zaproxy/action-api-scan@v0.9.0
        with:
          target: http://127.0.0.1:4000/openapi.json
          fail_action: true
          allow_issue_writing: false
          cmd_options: '-I'

      - name: Upload ZAP report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: zap-report
          path: report_json.json

      - name: Stop backend
        if: always()
        run: kill $(cat /tmp/backend.pid) 2>/dev/null || true
