name: DAST

on:
  push:
    branches: [main]
    paths:
      - 'api/**'
      - 'scraper/**'
  pull_request:
    branches: [main]
    paths:
      - 'api/**'
      - 'scraper/**'

jobs:
  zap:
    name: OWASP ZAP API Scan
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER:     cve
          POSTGRES_PASSWORD: cve
          POSTGRES_DB:       cvedb
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    steps:
      - uses: actions/checkout@v4

      - name: Build API image
        run: docker build -t cve-api:test ./api

      - name: Start API container
        run: |
          docker run -d \
            --name cve-api \
            --network host \
            -e DATABASE_URL=postgresql://cve:cve@localhost:5432/cvedb \
            -p 8080:8080 \
            cve-api:test

      - name: Wait for API to be ready
        run: |
          retries=0
          until curl -sf http://localhost:8080/healthz; do
            echo "waiting for API..."
            sleep 3
            retries=$((retries+1))
            if [ $retries -ge 20 ]; then echo "API not ready"; exit 1; fi
          done
          echo "API is ready"

      - name: Run OWASP ZAP API Scan
        uses: zaproxy/action-api-scan@v0.9.0
        with:
          target: http://localhost:8080/openapi.json
          fail_action: true
          allow_issue_writing: false
          cmd_options: '-I'

      - name: Upload ZAP report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: zap-report
          path: report_json.json