name: DAST – OWASP ZAP API Scan

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
  pull_request:
    branches: [main]
    paths:
      - 'backend/**'

jobs:
  zap:
    name: OWASP ZAP API Scan
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Build backend image
        run: docker build -t studio-fitness-backend:ci -f backend/Dockerfile.ci ./backend

      - name: Start backend container
        run: |
          docker run -d \
            --name backend \
            --network host \
            -e FIREBASE_MOCK=true \
            -e NODE_ENV=test \
            -e PORT=4000 \
            studio-fitness-backend:ci

      - name: Wait for backend to be ready
        run: |
          retries=0
          until curl -sf http://localhost:4000/api/health; do
            echo "waiting for backend..."
            sleep 3
            retries=$((retries + 1))
            if [ $retries -ge 20 ]; then
              echo "Backend did not start in time. Logs:"
              docker logs backend
              exit 1
            fi
          done
          echo "Backend is ready."

      - name: Run OWASP ZAP API Scan
        uses: zaproxy/action-api-scan@v0.9.0
        with:
          target: http://localhost:4000/openapi.json
          fail_action: false
          allow_issue_writing: false
          cmd_options: '-I'
